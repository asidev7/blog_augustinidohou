# Déploiement production — web (Gunicorn) + PostgreSQL.
# Nginx + TLS sont gérés par le Nginx de l'hôte (voir deploy/nginx/).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      # Exposé uniquement en local : le Nginx de l'hôte fait le reverse-proxy.
      - "127.0.0.1:8001:8000"

volumes:
  pgdata:
