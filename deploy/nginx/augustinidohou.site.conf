# Nginx (hôte) — reverse proxy vers Gunicorn (conteneur Docker, 127.0.0.1:8001)
# + service direct des fichiers statiques et médias.
#
# 1) Adapte le chemin du projet (PROJECT_DIR) ci-dessous si besoin.
# 2) Copie ce fichier dans /etc/nginx/sites-available/augustinidohou.site
# 3) ln -s vers sites-enabled, `nginx -t`, puis `systemctl reload nginx`
# 4) Lance Certbot : il transformera ce bloc 80 en 80→443 + TLS.
#
# Chemin du projet sur le serveur (où se trouve docker-compose.yml) :
#   /opt/augustinidohou

upstream augustin_app {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    listen [::]:80;
    server_name augustinidohou.site www.augustinidohou.site;

    # Taille max des uploads (photos de projets, etc.)
    client_max_body_size 20M;

    # Fichiers statiques collectés (collectstatic → ./staticfiles)
    location /static/ {
        alias /opt/augustinidohou/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Médias uploadés (photo, CV, couvertures...)
    location /media/ {
        alias /opt/augustinidohou/media/;
        access_log off;
        expires 7d;
    }

    # Application Django (Gunicorn)
    location / {
        proxy_pass http://augustin_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
