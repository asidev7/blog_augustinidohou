{% extends "dashboard/base_dashboard.html" %}
{% block page_title %}{% if cat %}Modifier la rubrique{% else %}Nouvelle rubrique{% endif %}{% endblock %}
{% block content %}
<form method="post" class="max-w-xl bg-white rounded-xl border border-ensoleille-bordure p-6 space-y-4">
  {% csrf_token %}
  {% include "dashboard/_form_fields.html" %}
  <div class="flex gap-2 pt-2">
    <button class="rounded-lg bg-ensoleille-or px-6 py-2.5 font-semibold text-ensoleille-noir hover:bg-ensoleille-ambre">Enregistrer</button>
    <a href="{% url 'dashboard:rubriques' %}" class="rounded-lg border border-ensoleille-bordure px-6 py-2.5 text-sm">Annuler</a>
  </div>
</form>
{% endblock %}
