{% extends "dashboard/base_dashboard.html" %}
{% block page_title %}Paramètres du site{% endblock %}
{% block content %}
<form method="post" enctype="multipart/form-data" class="max-w-3xl bg-white rounded-xl border border-ensoleille-bordure p-6 grid sm:grid-cols-2 gap-4">
  {% csrf_token %}
  {% include "dashboard/_form_fields.html" %}
  <div class="sm:col-span-2 flex gap-2 pt-2">
    <button class="rounded-lg bg-ensoleille-or px-6 py-2.5 font-semibold text-ensoleille-noir hover:bg-ensoleille-ambre">Enregistrer</button>
  </div>
</form>
{% endblock %}
