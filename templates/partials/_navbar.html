{% load static %}
<nav x-data="{ open: false, scrolled: false }"
     @scroll.window="scrolled = (window.pageYOffset > 20)"
     :class="scrolled ? 'bg-dark/80 backdrop-blur-md border-border' : 'bg-transparent border-transparent'"
     class="fixed top-0 inset-x-0 z-50 border-b transition-all duration-300">
  <div class="max-w-6xl mx-auto px-6">
    <div class="flex items-center justify-between h-16">

      <a href="{% url 'home' %}" class="flex items-center gap-2.5 group">
        <img src="{% static 'img/logo.svg' %}" alt="Logo Augustin Idohou" class="w-8 h-8">
        <span class="font-display font-bold text-lg tracking-tight text-white">
          idohou<span class="text-primary">.</span><span class="text-muted font-mono text-sm">dev</span>
        </span>
      </a>

      <!-- Desktop -->
      <div class="hidden md:flex items-center gap-8 font-mono text-sm">
        <a href="{% url 'home' %}" class="text-light/70 hover:text-primary transition-colors">accueil</a>
        <a href="{% url 'about' %}" class="text-light/70 hover:text-primary transition-colors">à-propos</a>
        <a href="{% url 'projects' %}" class="text-light/70 hover:text-primary transition-colors">projets</a>
        <a href="{% url 'services' %}" class="text-light/70 hover:text-primary transition-colors">services</a>
        <a href="{% url 'blog:list' %}" class="text-light/70 hover:text-primary transition-colors">blog</a>
        <a href="{% url 'cv' %}" class="text-light/70 hover:text-primary transition-colors">cv</a>
        <a href="{% url 'contact' %}" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-accent transition-colors">contact</a>
      </div>

      <!-- Burger -->
      <button @click="open = !open" class="md:hidden text-light w-10 h-10 flex items-center justify-center" aria-label="Menu">
        <svg x-show="!open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="open" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-show="open" x-cloak x-transition class="md:hidden bg-dark/95 backdrop-blur-md border-t border-border">
    <div class="px-6 py-6 flex flex-col gap-4 font-mono text-sm">
      <a href="{% url 'home' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">accueil</a>
      <a href="{% url 'about' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">à-propos</a>
      <a href="{% url 'projects' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">projets</a>
      <a href="{% url 'services' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">services</a>
      <a href="{% url 'blog:list' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">blog</a>
      <a href="{% url 'cv' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">cv</a>
      <a href="{% url 'faq' %}" @click="open=false" class="text-light/70 hover:text-primary transition-colors">faq</a>
      <a href="{% url 'contact' %}" @click="open=false" class="px-4 py-2.5 bg-primary text-white rounded-lg text-center hover:bg-accent transition-colors">contact</a>
    </div>
  </div>
</nav>
